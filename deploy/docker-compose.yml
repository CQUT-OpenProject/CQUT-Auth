name: cqut-auth

services:
  oidc-op:
    build:
      context: ..
      dockerfile: apps/oidc-op/Dockerfile
    env_file:
      - ./.env
    environment:
      PORT: 3003
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      OIDC_ISSUER: ${OIDC_ISSUER:-http://verify.local}
      OIDC_COOKIE_SECURE: ${OIDC_COOKIE_SECURE:-false}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

  demo-site:
    build:
      context: ..
      dockerfile: apps/demo-site/Dockerfile
    env_file:
      - ./.env
    environment:
      PORT: 3002
      OIDC_ISSUER: ${OIDC_ISSUER:-http://verify.local}
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-http://oidc-op:3003/.well-known/openid-configuration}
      OIDC_DEMO_CLIENT_ID: ${OIDC_DEMO_CLIENT_ID:-demo-site}
      OIDC_DEMO_CLIENT_SECRET: ${OIDC_DEMO_CLIENT_SECRET:-demo-site-secret}
      DEMO_BASE_URL: ${DEMO_BASE_URL:-http://verify.local}
    depends_on:
      oidc-op:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/demo >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cqut_auth"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.29-alpine
    env_file:
      - ./.env
    ports:
      - "80:80"
    volumes:
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      oidc-op:
        condition: service_healthy
      demo-site:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/.well-known/openid-configuration >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped
    networks:
      - internal

volumes:
  redis_data:
  postgres_data:

networks:
  internal:
