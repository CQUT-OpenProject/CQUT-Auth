name: cqut-auth

services:
  auth-service:
    build:
      context: ..
      dockerfile: apps/auth-service/Dockerfile
    env_file:
      - ./env/auth-service.env.example
    environment:
      PORT: 3001
      WORKER_MODE: external
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cqut_auth
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

  auth-worker:
    build:
      context: ..
      dockerfile: apps/auth-service/Dockerfile
    command: ["node", "apps/auth-service/dist/worker.js"]
    env_file:
      - ./env/auth-service.env.example
    environment:
      PORT: 3001
      WORKER_MODE: external
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cqut_auth
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  demo-site:
    build:
      context: ..
      dockerfile: apps/demo-site/Dockerfile
    env_file:
      - ./env/demo-site.env.example
    environment:
      PORT: 3002
      AUTH_SERVICE_BASE_URL: http://auth-service:3001
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/demo >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cqut_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cqut_auth"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.29-alpine
    env_file:
      - ./env/nginx.env.example
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/site.prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      auth-service:
        condition: service_healthy
      demo-site:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1/api/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

volumes:
  redis_data:
  postgres_data:

networks:
  internal:
