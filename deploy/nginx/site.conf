server {
  listen 80;
  server_name localhost 127.0.0.1 verify.local;
  resolver 127.0.0.11 ipv6=off valid=30s;
  set $oidc_upstream http://oidc-op:3003;

  # Enforce Nginx as the single source of security headers.
  proxy_hide_header Content-Security-Policy;
  proxy_hide_header X-Content-Type-Options;
  proxy_hide_header X-Frame-Options;
  proxy_hide_header Referrer-Policy;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; base-uri 'self'; frame-ancestors 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = / {
    return 404;
  }

  location = /api {
    return 404;
  }

  location = /favicon.ico {
    return 204;
  }

  location /.well-known/ {
    proxy_pass $oidc_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    # Overwrite forwarded headers at the trusted edge. Do not append client-supplied values.
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
  }

  location ~ ^/(auth|token|userinfo|jwks|session|interaction)(/.*)?$ {
    proxy_pass $oidc_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    # Overwrite forwarded headers at the trusted edge. Do not append client-supplied values.
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
  }

  location /api/ {
    return 404;
  }
}
