<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CQUT Auth Demo</title>
    <link rel="stylesheet" href="/demo/assets/style.css" />
  </head>
  <body>
    <header class="menubar" aria-label="Classic menu bar">
      <div class="menubar-group">
        <span class="menu-mark" aria-hidden="true"></span>
        <span>CQUT Auth</span>
        <a
          class="menubar-link"
          href="https://github.com/CQUT-OpenProject/CQUT-Auth"
          target="_blank"
          rel="noreferrer"
        >
          Repository
        </a>
      </div>
      <div class="menubar-group">
        <span>© 2026 CQUT OpenSourceProject</span>
      </div>
    </header>

    <main class="shell">
      <div class="titlebar">
        <div class="window-controls" aria-hidden="true">
          <span></span>
          <span></span>
        </div>
        <h1>CQUT Auth Demo</h1>
        <div class="window-version">v1</div>
      </div>

      <div class="window-body">
        <div class="workspace">
          <section class="group-box panel-form compact-panel">
            <div class="panel-titlebar">
              <h2>Verify</h2>
            </div>

            <form id="verify-form" class="verify-form">
              <label class="field">
                <span class="sr-only">账号</span>
                <input
                  id="account-input"
                  name="account"
                  type="text"
                  autocomplete="username"
                  placeholder="账号 / Account"
                  aria-label="账号"
                />
              </label>

              <label class="field">
                <span class="sr-only">密码</span>
                <input
                  id="password-input"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="密码 / Password"
                  aria-label="密码"
                />
              </label>

              <label class="toggle-field" for="dedupe-toggle">
                <input id="dedupe-toggle" name="include_dedupe" type="checkbox" />
                <span>请求去重标识</span>
              </label>

              <button id="submit-button" type="submit">Verify</button>
            </form>
          </section>

          <section class="group-box panel-status compact-panel">
            <div class="panel-header">
              <div class="panel-titlebar">
                <h2>Status</h2>
              </div>
              <span id="state-badge" class="state-badge" data-mode="idle">IDLE</span>
            </div>

            <div class="status-copy">
              <h3 id="state-title">READY</h3>
              <p id="state-detail"></p>
            </div>

            <dl class="result-grid">
              <div>
                <dt>request_id</dt>
                <dd id="request-id">-</dd>
              </div>
              <div>
                <dt>status</dt>
                <dd id="request-status">idle</dd>
              </div>
              <div>
                <dt>completed_at</dt>
                <dd id="completed-at">-</dd>
              </div>
              <div>
                <dt>student_status</dt>
                <dd id="student-status">-</dd>
              </div>
              <div>
                <dt>school</dt>
                <dd id="school">-</dd>
              </div>
              <div>
                <dt>dedupe_key</dt>
                <dd id="dedupe-key">-</dd>
              </div>
              <div class="result-wide">
                <dt>retry_after_seconds</dt>
                <dd id="retry-after">-</dd>
              </div>
            </dl>
          </section>

          <section class="group-box json-panel compact-panel">
            <div class="json-header panel-titlebar">
              <h2>Raw JSON</h2>
              <span>latest</span>
            </div>
            <pre id="raw-response">{
  "hint": "recent response will appear here"
}</pre>
          </section>
        </div>
      </div>
    </main>

    <script src="/demo/assets/app.js"></script>
  </body>
</html>
